<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冒険ToDo 🌟 完全版</title>
    <style>
        :root { --primary-bg: #E8F5E9; --primary-main: #81C784; --primary-dark: #2E7D32; --accent: #FF80AB; }
        body.theme-green { --primary-bg: #E8F5E9; --primary-main: #81C784; --primary-dark: #2E7D32; }
        body.theme-pink  { --primary-bg: #FCE4EC; --primary-main: #F06292; --primary-dark: #880E4F; }
        body.theme-blue  { --primary-bg: #E1F5FE; --primary-main: #4FC3F7; --primary-dark: #01579B; }
        body.theme-yellow{ --primary-bg: #FFFDE7; --primary-main: #FFF176; --primary-dark: #F57F17; }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: var(--primary-bg); transition: 0.3s; }
        body { display: flex; flex-direction: column; }
        
        #clock-area { height: 18vh; background: white; border-bottom: 3px solid var(--primary-main); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
        #clock { font-size: 7vh; font-weight: bold; color: var(--primary-dark); font-family: monospace; line-height: 1; }
        #player-info { font-size: 2vh; font-weight: bold; color: var(--primary-dark); margin-top: 2px; }

        #task-area { height: 82vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px 5px; box-sizing: border-box; }
        #task-title { font-size: 3.5vh; font-weight: bold; color: var(--primary-dark); text-align: center; }

        .img-box { height: 25vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #task-img { height: 100%; width: auto; transition: 1s linear; }

        #timer { font-size: 8vh; font-weight: bold; color: #D32F2F; background: white; padding: 5px 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-done { background: var(--primary-main); color: white; border: none; width: 85%; height: 10vh; font-size: 4vh; font-weight: bold; border-radius: 20px; box-shadow: 0 5px var(--primary-dark); cursor: pointer; }

        #congrats-layer { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .pika-text { font-size: 5vh; font-weight: bold; color: #E65100; animation: pika 0.8s infinite; margin: 15px; }

        #gacha-overlay { display: none; position: fixed; inset: 0; background: #FFF9C4; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        .machine-body { width: 180px; height: 240px; background: #EF5350; border-radius: 20px; position: relative; border: 4px solid #B71C1C; }
        .machine-glass { width: 140px; height: 120px; background: rgba(255,255,255,0.7); border-radius: 50% 50% 0 0; position: absolute; top: 10px; left: 20px; overflow: hidden; }
        .handle-unit { width: 60px; height: 60px; background: #9E9E9E; border: 4px solid #424242; border-radius: 50%; position: absolute; bottom: 40px; left: 60px; transition: transform 0.6s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .handle-unit::after { content: ''; width: 40px; height: 10px; background: #424242; border-radius: 5px; }
        #capsule-obj { display: none; width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(to bottom, #FFEB3B 50%, #FFF 50%); position: absolute; bottom: 40px; cursor: pointer; border: 2px solid #333; animation: drop 0.5s ease-out forwards; }
        
        #ticket-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #ticket-card { width: 80%; background: white; color: #333; padding: 20px; border-radius: 20px; border: 6px dashed #FF9800; }

        #config-modal { position: fixed; inset: 0; background: white; z-index: 500; padding: 20px; overflow-y: auto; display: none; }

        @keyframes drop { 0% { transform: translateY(0) scale(0); } 100% { transform: translateY(110px) scale(1.4); } }
        @keyframes pika { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="theme-green">

    <div id="clock-area">
        <button onclick="openConfig()" style="position:absolute; top:8px; right:8px; opacity:0.3; border:none; background:none; font-size:3.5vh;">⚙</button>
        <div id="clock">00:00:00</div>
        <div id="player-info"><span id="display-name">冒険者</span>: <span id="display-score">0</span> pt</div>
    </div>

    <div id="task-area">
        <div id="task-title">準備中...</div>
        <div class="img-box"><img id="task-img" src="https://i.imgur.com/doOjZrX.png"></div>
        <div id="timer">00:00</div>
        <button class="btn-done" onclick="completeTask()">できた！</button>
        <div style="margin-bottom:10px; opacity:0.2; font-size:1.5vh;" onclick="if(confirm('リセット？')) resetProgress()">最初からやりなおす</div>
    </div>

    <div id="congrats-layer">
        <h2 id="finish-msg">ナイス！</h2>
        <div id="final-pts" class="pika-text">0 pt</div>
        <div id="gacha-status" style="margin-bottom:15px; color:#555;"></div>
        <button id="exchange-btn" class="btn-done" style="width:75%;" onclick="startGacha()">🎁 ガチャをまわす</button>
        <p style="margin-top:20px; font-size:2vh; color:#888;">またあした遊ぶときは<br><b>「さいよみこみ（リロード）」</b>してね！</p>
    </div>

    <div id="gacha-overlay">
        <h2>ごほうびガチャ！</h2>
        <div class="machine-body">
            <div class="machine-glass">
                <div style="position:absolute; top:20px; left:30px; width:25px; height:25px; background:#2196F3; border-radius:50%;"></div>
                <div style="position:absolute; top:50px; left:80px; width:25px; height:25px; background:#FFEB3B; border-radius:50%;"></div>
            </div>
            <div id="gacha-handle" class="handle-unit" onclick="spinGacha()"></div>
            <div id="capsule-obj" onclick="openReward()"></div>
        </div>
        <p id="hint-msg" style="margin-top:20px; font-weight:bold;">ハンドルを まわしてね！</p>
    </div>

    <div id="ticket-screen">
        <h2 id="rare-label"></h2>
        <div id="ticket-card">
            <p>☆☆ ごほうびチケット ☆☆</p>
            <h1 id="prize-name"></h1>
        </div>
        <button class="btn-done" style="margin-top:30px; height:8vh; width:60%;" onclick="closeTicket()">ポイント画面へ</button>
    </div>

    <div id="config-modal">
        <h2>⚙ 設定</h2>
        <div style="margin-bottom:10px;"><label>なまえ</label><input type="text" id="cfg-name" style="width:100%; padding:8px;"></div>
        <div style="margin-bottom:10px;"><label>ガチャpt</label><input type="number" id="cfg-gacha-cost" style="width:100%; padding:8px;"></div>
        <div style="margin-bottom:10px;"><label>タスク(名,秒)</label><textarea id="cfg-tasks" rows="3" style="width:100%; padding:8px;"></textarea></div>
        <div style="margin-bottom:10px;"><label>ごほうび(名,レア)</label><textarea id="cfg-prizes" rows="3" style="width:100%; padding:8px;"></textarea></div>
        <button class="btn-done" style="width:100%; height:8vh;" onclick="saveConfig()">保存</button>
        <button onclick="document.getElementById('config-modal').style.display='none'" style="width:100%; margin-top:10px; padding:10px;">とじる</button>
    </div>

    <script>
        let config = {
            name: "冒険者", theme: "theme-green", gachaCost: 1000,
            tasks: [{t:"おきる", s:600},{t:"ごはん", s:900},{t:"はをみがく", s:300}],
            prizes: [{n:"おかし", r:"ノーマル"}]
        };
        let state = { idx: 0, left: 0, total: 0, score: 0, tid: null, spinning: false };

        window.onload = () => {
            const scfg = localStorage.getItem('child_todo_final_cfg');
            if(scfg) config = JSON.parse(scfg);
            const ss = localStorage.getItem('child_todo_final_score');
            state.score = ss ? parseInt(ss) : 0;
            const si = localStorage.getItem('child_todo_final_idx');
            state.idx = si ? parseInt(si) : 0;

            document.getElementById('display-name').innerText = config.name;
            document.getElementById('display-score').innerText = state.score;
            updateClock(); setInterval(updateClock, 1000);
            startTask();
        };

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP'); }

        function startTask() {
            const t = config.tasks[state.idx];
            if(!t) { showCongrats(true); return; }
            
            state.left = state.total = t.s;
            document.getElementById('task-title').innerText = `${state.idx+1}) ${t.t}`;
            document.getElementById('task-img').style.display = 'block';
            if(state.tid) clearInterval(state.tid);
            state.tid = setInterval(() => {
                if(state.left > 0) {
                    state.left--;
                    const m = Math.floor(state.left/60), s = state.left%60;
                    document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                    document.getElementById('task-img').style.height = (state.left / state.total * 100) + "%";
                    if(state.left <= 0) document.getElementById('task-img').style.display = 'none';
                }
            }, 1000);
        }

        function completeTask() {
            state.score += state.left;
            state.idx++; 
            localStorage.setItem('child_todo_final_score', state.score);
            document.getElementById('display-score').innerText = state.score;
            
            if(state.idx < config.tasks.length) {
                // まだタスクがあるなら進捗を保存して次へ
                localStorage.setItem('child_todo_final_idx', state.idx);
                startTask();
            } else {
                // 全部終わったら、次は最初から始まるようにインデックスを0で保存
                localStorage.setItem('child_todo_final_idx', 0);
                showCongrats(true);
            }
        }

        function showCongrats(isFinishAll = false) {
            if(state.tid) clearInterval(state.tid);
            document.getElementById('congrats-layer').style.display = 'flex';
            document.getElementById('finish-msg').innerText = isFinishAll ? "全クリア！" : "ナイス！";
            document.getElementById('final-pts').innerText = `累計 ${state.score} pt！！`;
            const canGacha = state.score >= config.gachaCost;
            document.getElementById('exchange-btn').style.display = canGacha ? 'block' : 'none';
            document.getElementById('gacha-status').innerText = canGacha ? "" : `あと ${config.gachaCost - state.score} ptでガチャ！`;
        }

        function resetProgress() {
            localStorage.setItem('child_todo_final_idx', 0);
            location.reload();
        }

        function startGacha() { document.getElementById('gacha-overlay').style.display = 'flex'; }

        function spinGacha() {
            if(state.spinning) return;
            state.spinning = true;
            document.getElementById('gacha-handle').style.transform = "rotate(360deg)";
            setTimeout(() => {
                document.getElementById('capsule-obj').style.display = 'block';
                document.getElementById('hint-msg').innerText = "カプセルをタップ！";
            }, 700);
        }

        function openReward() {
            state.score -= config.gachaCost;
            localStorage.setItem('child_todo_final_score', state.score);
            document.getElementById('display-score').innerText = state.score;
            const res = config.prizes[Math.floor(Math.random()*config.prizes.length)];
            document.getElementById('ticket-screen').style.display = 'flex';
            document.getElementById('prize-name').innerText = res.n;
            document.getElementById('rare-label').innerText = (res.r || "ノーマル") + "！！";
        }

        function closeTicket() {
            document.getElementById('ticket-screen').style.display = 'none';
            document.getElementById('gacha-overlay').style.display = 'none';
            state.spinning = false;
            document.getElementById('capsule-obj').style.display = 'none';
            document.getElementById('gacha-handle').style.transform = "rotate(0deg)";
            showCongrats(true);
        }

        function openConfig() {
            document.getElementById('cfg-name').value = config.name;
            document.getElementById('cfg-gacha-cost').value = config.gachaCost;
            document.getElementById('cfg-tasks').value = config.tasks.map(x=>`${x.t},${x.s}`).join('\n');
            document.getElementById('cfg-prizes').value = config.prizes.map(x=>`${x.n},${x.r}`).join('\n');
            document.getElementById('config-modal').style.display = 'block';
        }

        function saveConfig() {
            config.name = document.getElementById('cfg-name').value;
            config.gachaCost = parseInt(document.getElementById('cfg-gacha-cost').value);
            config.tasks = document.getElementById('cfg-tasks').value.split('\n').filter(l=>l).map(l=>{
                const p = l.split(','); return {t:p[0].trim(), s:parseInt(p[1])||60};
            });
            config.prizes = document.getElementById('cfg-prizes').value.split('\n').filter(l=>l).map(l=>{
                const p = l.split(','); return {n:p[0].trim(), r:(p[1]||"ノーマル").trim()};
            });
            localStorage.setItem('child_todo_final_cfg', JSON.stringify(config));
            localStorage.setItem('child_todo_final_idx', 0);
            location.reload();
        }
    </script>
</body>
</html>
