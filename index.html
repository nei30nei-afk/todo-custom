<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冒険ToDoカスタム 🌟 画面最適化版</title>
    <style>
        :root {
            --primary-bg: #E8F5E9; --primary-main: #81C784; --primary-dark: #2E7D32; --accent: #FF80AB;
        }
        body.theme-green { --primary-bg: #E8F5E9; --primary-main: #81C784; --primary-dark: #2E7D32; }
        body.theme-pink  { --primary-bg: #FCE4EC; --primary-main: #F06292; --primary-dark: #880E4F; }
        body.theme-blue  { --primary-bg: #E1F5FE; --primary-main: #4FC3F7; --primary-dark: #01579B; }
        body.theme-yellow{ --primary-bg: #FFFDE7; --primary-main: #FFF176; --primary-dark: #F57F17; }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: var(--primary-bg); transition: 0.3s; touch-action: manipulation; }
        body { display: flex; flex-direction: column; }
        
        /* 比率調整：時計エリアを少しコンパクトに */
        #clock-area { height: 18vh; background: white; border-bottom: 3px solid var(--primary-main); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
        #clock { font-size: 7vh; font-weight: bold; color: var(--primary-dark); font-family: monospace; line-height: 1; }
        #player-info { font-size: 2vh; font-weight: bold; color: var(--primary-dark); margin-top: 2px; }

        /* タスクエリア：要素間の隙間を詰め、一画面に収める */
        #task-area { height: 82vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px 5px; box-sizing: border-box; }

        #task-title { font-size: 3.5vh; font-weight: bold; color: var(--primary-dark); text-align: center; margin-top: 5px; }
        
        /* 画像エリアを固定し、はみ出しを防止 */
        .img-box { height: 22vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #task-img { height: 100%; width: auto; transition: 1s linear; }

        #timer { font-size: 8vh; font-weight: bold; color: #D32F2F; background: white; padding: 5px 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* ボタンサイズをスリム化 */
        .btn-done { background: var(--primary-main); color: white; border: none; width: 85%; height: 10vh; font-size: 4vh; font-weight: bold; border-radius: 20px; box-shadow: 0 5px var(--primary-dark); cursor: pointer; }
        .btn-done:active { transform: translateY(3px); box-shadow: 0 2px var(--primary-dark); }

        /* 下部ボタンエリア */
        .bottom-controls { width: 90%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #pause-btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-size: 1.8vh; font-weight: bold; box-shadow: 0 3px #C51162; }
        #pause-btn.paused { background: #9E9E9E; box-shadow: 0 3px #616161; }
        #reset-btn { background: none; border: 1px solid rgba(0,0,0,0.1); color: #888; padding: 5px 10px; border-radius: 8px; font-size: 1.4vh; }

        #config-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; font-size: 3.5vh; cursor: pointer; opacity: 0.3; }

        /* クリア画面・演出等は維持 */
        #congrats-layer { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .pika-text { font-size: 5vh; font-weight: bold; color: #E65100; animation: pika 0.8s infinite; margin: 15px; }
        .exchange-btn { background: #FF9800; color: white; border: none; padding: 15px 25px; border-radius: 15px; font-size: 3vh; font-weight: bold; box-shadow: 0 5px #E65100; animation: pika 1s infinite; }

        /* 設定画面 */
        #config-modal { position: fixed; inset: 0; background: white; z-index: 500; padding: 20px; overflow-y: auto; display: none; }
        .config-item { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; font-weight: bold; font-size: 12px; color: #666; }
        input, select, textarea { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }

        #gacha-overlay { display: none; position: fixed; inset: 0; background: #FFF9C4; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        #ticket-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #ticket-card { width: 80%; background: white; color: #333; padding: 20px; border-radius: 20px; border: 6px dashed #FF9800; }

        @keyframes pika { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="theme-green">

    <div id="clock-area">
        <button id="config-btn" onclick="openConfig()">⚙</button>
        <div id="clock">00:00:00</div>
        <div id="player-info"><span id="display-name">冒険者</span>: <span id="display-score">0</span> pt</div>
    </div>

    <div id="task-area">
        <div id="task-title">読み込み中...</div>
        <div class="img-box"><img id="task-img" src="https://i.imgur.com/doOjZrX.png"></div>
        <div id="timer">00:00</div>
        <button class="btn-done" onclick="completeTask()">できた！</button>
        
        <div class="bottom-controls">
            <button id="pause-btn" onclick="togglePause()">ストップ</button>
            <button id="reset-btn" onclick="resetToday()">リセット</button>
        </div>
    </div>

    <div id="congrats-layer">
        <h2 id="finish-msg">ぜんぶできた！！</h2>
        <div id="final-pts" class="pika-text">0 pt</div>
        <button id="exchange-btn" class="exchange-btn" onclick="startGacha()">🎁 ガチャをまわす！</button>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; text-decoration:underline;">あしたもがんばる</button>
    </div>

    <div id="config-modal">
        <h2>⚙ 設定</h2>
        <div class="config-item"><label>なまえ</label><input type="text" id="cfg-name"></div>
        <div class="config-item"><label>テーマカラー</label><select id="cfg-theme"><option value="theme-green">グリーン</option><option value="theme-pink">ピンク</option><option value="theme-blue">ブルー</option><option value="theme-yellow">イエロー</option></select></div>
        <div class="config-item"><label>一時停止ボタン名</label><input type="text" id="cfg-pause-name"></div>
        <div class="config-item"><label>クリアメッセージ</label><input type="text" id="cfg-finish-msg"></div>
        <div class="config-item"><label>ガチャ必要pt</label><input type="number" id="cfg-gacha-cost"></div>
        <div class="config-item"><label>タスク (名前,秒数)</label><textarea id="cfg-tasks" rows="4"></textarea></div>
        <div class="config-item"><label>ごほうび (名前,レア度)</label><textarea id="cfg-prizes" rows="4"></textarea></div>
        <button class="save-btn" onclick="saveConfig()">保存してスタート</button>
        <button onclick="closeConfig()" style="width:100%; margin-top:10px; background:#ccc; border:none; padding:10px; border-radius:10px;">もどる</button>
    </div>

    <div id="gacha-overlay">
        <h1>ドキドキガチャ</h1>
        <div id="lever" onclick="spinLever()" style="width:80px; height:80px; background:#9E9E9E; border-radius:50%; border:4px solid #616161; display:flex; align-items:center; justify-content:center; transition:0.5s; cursor:pointer;"><div style="width:60px; height:12px; background:#333; border-radius:6px;"></div></div>
        <p>レバーをまわしてね！</p>
    </div>

    <div id="ticket-screen">
        <h2 id="rare-label"></h2>
        <div id="ticket-card">
            <p>☆☆ ごほうびチケット ☆☆</p>
            <h1 id="prize-name"></h1>
        </div>
        <button class="btn-done" style="margin-top:20px; height:8vh;" onclick="location.reload()">またあした！</button>
    </div>

    <script>
        let config = {
            name: "冒険者", theme: "theme-green", pauseName: "かか",
            finishMsg: "ぜんぶできた！！", gachaCost: 5000,
            tasks: [{t:"おきる", s:600},{t:"ごはん", s:900},{t:"はをみがく", s:300}],
            prizes: [{n:"YouTube 10分", r:"ノーマル"}]
        };
        let state = { idx: 0, left: 0, total: 0, score: 0, tid: null, isPaused: false };

        window.onload = () => { load(); updateClock(); setInterval(updateClock, 1000); startTask(); };
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP'); }

        function load() {
            const scfg = localStorage.getItem('adv_dist_cfg_v3');
            if(scfg) config = JSON.parse(scfg);
            const ss = localStorage.getItem('adv_dist_score_v3');
            state.score = ss ? parseInt(ss) : 0;
            document.body.className = config.theme;
            document.getElementById('display-name').innerText = config.name;
            document.getElementById('display-score').innerText = state.score;
            document.getElementById('pause-btn').innerText = config.pauseName;
        }

        function startTask() {
            if(state.tid) clearInterval(state.tid);
            const t = config.tasks[state.idx];
            if(!t) { showCongrats(); return; }
            state.left = state.total = t.s;
            state.isPaused = false;
            document.getElementById('task-title').innerText = `${state.idx+1}) ${t.t}`;
            updatePauseBtn();
            state.tid = setInterval(() => {
                if(!state.isPaused && state.left > 0) {
                    state.left--;
                    const m = Math.floor(state.left/60), s = state.left%60;
                    document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                    document.getElementById('task-img').style.height = (100 * (state.left/state.total)) + "%";
                }
            }, 1000);
        }

        function completeTask() {
            state.score += state.left;
            localStorage.setItem('adv_dist_score_v3', state.score);
            document.getElementById('display-score').innerText = state.score;
            state.idx++;
            startTask();
        }

        function togglePause() { state.isPaused = !state.isPaused; updatePauseBtn(); }
        function updatePauseBtn() {
            const btn = document.getElementById('pause-btn');
            btn.innerText = state.isPaused ? "さいかい" : config.pauseName;
            btn.className = state.isPaused ? "paused" : "";
        }

        function resetToday() { if(confirm("はじめからやりなおしますか？")){ state.idx=0; startTask(); } }

        function showCongrats() {
            document.getElementById('congrats-layer').style.display = 'flex';
            document.getElementById('finish-msg').innerText = config.finishMsg;
            document.getElementById('final-pts').innerText = `累計 ${state.score} pt！！`;
            document.getElementById('exchange-btn').style.display = (state.score >= config.gachaCost) ? 'block' : 'none';
        }

        function openConfig() {
            document.getElementById('cfg-name').value = config.name;
            document.getElementById('cfg-theme').value = config.theme;
            document.getElementById('cfg-pause-name').value = config.pauseName;
            document.getElementById('cfg-finish-msg').value = config.finishMsg;
            document.getElementById('cfg-gacha-cost').value = config.gachaCost;
            document.getElementById('cfg-tasks').value = config.tasks.map(x=>`${x.t},${x.s}`).join('\n');
            document.getElementById('cfg-prizes').value = config.prizes.map(x=>`${x.n},${x.r}`).join('\n');
            document.getElementById('config-modal').style.display = 'block';
        }
        function closeConfig() { document.getElementById('config-modal').style.display = 'none'; }
        function saveConfig() {
            config.name = document.getElementById('cfg-name').value;
            config.theme = document.getElementById('cfg-theme').value;
            config.pauseName = document.getElementById('cfg-pause-name').value;
            config.finishMsg = document.getElementById('cfg-finish-msg').value;
            config.gachaCost = parseInt(document.getElementById('cfg-gacha-cost').value)||5000;
            config.tasks = document.getElementById('cfg-tasks').value.split('\n').filter(l=>l).map(l=>{
                const p = l.split(','); return {t:p[0].trim(), s:parseInt(p[1])||60};
            });
            config.prizes = document.getElementById('cfg-prizes').value.split('\n').filter(l=>l).map(l=>{
                const p = l.split(','); return {n:p[0].trim(), r:(p[1]||"ノーマル").trim()};
            });
            localStorage.setItem('adv_dist_cfg_v3', JSON.stringify(config));
            location.reload();
        }

        function startGacha() { document.getElementById('gacha-overlay').style.display = 'flex'; }
        function spinLever() {
            const lev = document.getElementById('lever');
            if(lev.style.transform === "rotate(360deg)") return;
            lev.style.transform = "rotate(360deg)";
            setTimeout(showResult, 1000);
        }
        function showResult() {
            state.score -= config.gachaCost;
            localStorage.setItem('adv_dist_score_v3', state.score);
            const rand = Math.random()*100;
            let pool = rand<10 ? config.prizes.filter(x=>x.r==="Sレア") : rand<40 ? config.prizes.filter(x=>x.r==="レア") : config.prizes.filter(x=>x.r==="ノーマル");
            if(pool.length === 0) pool = config.prizes;
            const res = pool[Math.floor(Math.random()*pool.length)];
            document.getElementById('ticket-screen').style.display = 'flex';
            document.getElementById('prize-name').innerText = res.n;
            document.getElementById('rare-label').innerText = res.r + "！！";
        }
    </script>
</body>
</html>
