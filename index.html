<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冒険ToDo 🌟 カスタム版</title>
    <style>
        :root { --bg: #E8F5E9; --main: #81C784; --dark: #2E7D32; }
        body.theme-green  { --bg: #E8F5E9; --main: #81C784; --dark: #2E7D32; }
        body.theme-pink   { --bg: #FCE4EC; --main: #F06292; --dark: #880E4F; }
        body.theme-blue   { --bg: #E1F5FE; --main: #4FC3F7; --dark: #01579B; }
        body.theme-yellow { --bg: #FFFDE7; --main: #FFF176; --dark: #F57F17; }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: var(--bg); transition: 0.3s; }
        body { display: flex; flex-direction: column; }
        
        #clock-area { height: 18vh; background: white; border-bottom: 3px solid var(--main); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
        #clock { font-size: 7vh; font-weight: bold; color: var(--dark); font-family: monospace; line-height: 1; }
        #player-info { font-size: 2.2vh; font-weight: bold; color: var(--dark); margin-top: 2px; }

        #task-area { height: 82vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px 5px; box-sizing: border-box; }
        #task-title { font-size: 3.5vh; font-weight: bold; color: var(--dark); text-align: center; }

        .img-box { height: 22vh; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #task-img { height: 100%; width: auto; transition: 1s linear; }
        #pause-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.7); display: none; align-items: center; justify-content: center; font-size: 4vh; font-weight: bold; color: #666; }

        #timer { font-size: 8vh; font-weight: bold; color: #D32F2F; background: white; padding: 5px 25px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .controls { width: 90%; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn-done { background: var(--main); color: white; border: none; width: 100%; height: 9vh; font-size: 4vh; font-weight: bold; border-radius: 20px; box-shadow: 0 5px var(--dark); cursor: pointer; }
        
        /* --- ボタンの色の設定 --- */
        /* 通常時：紫 */
        .btn-pause { background: #9575CD; color: white; border: none; width: 60%; height: 6vh; font-size: 2.5vh; font-weight: bold; border-radius: 15px; box-shadow: 0 4px #673AB7; cursor: pointer; }
        /* 停止中：前のオレンジを維持 */
        .btn-pause.active { background: #FF7043; box-shadow: 0 4px #D84315; }

        #congrats-layer { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .pika-text { font-size: 5vh; font-weight: bold; color: #E65100; animation: pika 0.8s infinite; margin: 15px; }

        #gacha-overlay { display: none; position: fixed; inset: 0; background: #FFF9C4; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
        .machine-body { width: 180px; height: 240px; background: #EF5350; border-radius: 20px; position: relative; border: 4px solid #B71C1C; }
        .machine-glass { width: 140px; height: 120px; background: rgba(255,255,255,0.7); border-radius: 50% 50% 0 0; position: absolute; top: 10px; left: 20px; overflow: hidden; }
        .handle-unit { width: 60px; height: 60px; background: #9E9E9E; border: 4px solid #424242; border-radius: 50%; position: absolute; bottom: 40px; left: 60px; transition: transform 0.6s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .handle-unit::after { content: ''; width: 40px; height: 10px; background: #424242; border-radius: 5px; }
        #capsule-obj { display: none; width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(to bottom, #FFEB3B 50%, #FFF 50%); position: absolute; bottom: 40px; cursor: pointer; border: 2px solid #333; animation: drop 0.5s ease-out forwards; }
        
        #ticket-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        #ticket-card { width: 80%; background: white; color: #333; padding: 20px; border-radius: 20px; border: 6px dashed #FF9800; }

        #config-modal { position: fixed; inset: 0; background: white; z-index: 500; padding: 20px; overflow-y: auto; display: none; }
        .cfg-row { margin-bottom: 15px; }
        .cfg-row label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 1.8vh; }
        .cfg-row input, .cfg-row select, .cfg-row textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; font-size: 2vh; }

        @keyframes drop { 0% { transform: translateY(0) scale(0); } 100% { transform: translateY(110px) scale(1.4); } }
        @keyframes pika { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="theme-green">

    <div id="clock-area">
        <button onclick="openConfig()" style="position:absolute; top:8px; right:8px; opacity:0.3; border:none; background:none; font-size:4vh;">⚙</button>
        <div id="clock">00:00:00</div>
        <div id="player-info"><span id="display-name">冒険者</span>: <span id="display-score">0</span> pt</div>
    </div>

    <div id="task-area">
        <div id="task-title">準備中...</div>
        <div class="img-box">
            <img id="task-img" src="https://i.imgur.com/doOjZrX.png">
            <div id="pause-overlay">おやすみ中</div>
        </div>
        <div id="timer">00:00</div>
        
        <div class="controls">
            <button class="btn-done" onclick="completeTask()">できた！</button>
            <button id="pause-btn" class="btn-pause" onclick="togglePause()">ちょっとまって！</button>
        </div>

        <div style="margin-bottom:5px; opacity:0.4; font-size:1.6vh; color: var(--dark); text-decoration: underline;" onclick="if(confirm('ポイントと進捗をリセットしますか？')) resetProgress()">ポイントリセット</div>
    </div>

    <div id="congrats-layer">
        <h2 id="finish-msg">全クリア！</h2>
        <div id="final-pts" class="pika-text">0 pt</div>
        <div id="gacha-status" style="margin-bottom:15px; color:#555;"></div>
        <button id="exchange-btn" class="btn-done" style="width:75%;" onclick="startGacha()">🎁 ガチャをまわす</button>
        <p style="margin-top:20px; font-size:2vh; color:#888;">またあしたあそぶときは<br>リロードしてね！</p>
    </div>

    <div id="gacha-overlay">
        <h2>ごほうびガチャ！</h2>
        <div class="machine-body">
            <div class="machine-glass">
                <div style="position:absolute; top:20px; left:30px; width:25px; height:25px; background:#2196F3; border-radius:50%;"></div>
                <div style="position:absolute; top:50px; left:80px; width:25px; height:25px; background:#FFEB3B; border-radius:50%;"></div>
            </div>
            <div id="gacha-handle" class="handle-unit" onclick="spinGacha()"></div>
            <div id="capsule-obj" onclick="openReward()"></div>
        </div>
        <p id="hint-msg" style="margin-top:20px; font-weight:bold;">ハンドルを まわしてね！</p>
    </div>

    <div id="ticket-screen">
        <h2 id="rare-label"></h2>
        <div id="ticket-card">
            <p>☆☆ ごほうびチケット ☆☆</p>
            <h1 id="prize-name"></h1>
        </div>
        <button class="btn-done" style="margin-top:30px; height:8vh; width:60%;" onclick="closeTicket()">ポイント画面へ</button>
    </div>

    <div id="config-modal">
        <h2>⚙ 設定</h2>
        <div class="cfg-row">
            <label>テーマカラー</label>
            <select id="cfg-theme">
                <option value="theme-green">グリーン</option>
                <option value="theme-pink">ピンク</option>
                <option value="theme-blue">ブルー</option>
                <option value="theme-yellow">イエロー</option>
            </select>
        </div>
        <div class="cfg-row"><label>なまえ</label><input type="text" id="cfg-name"></div>
        <div class="cfg-row"><label>一時停止ボタンの名前</label><input type="text" id="cfg-pause-name"></div>
        <div class="cfg-row"><label>ガチャ1回のコスト(pt)</label><input type="number" id="cfg-gacha-cost"></div>
        <div class="cfg-row"><label>タスク(名前,秒) ※1行に1つ</label><textarea id="cfg-tasks" rows="4"></textarea></div>
        <div class="cfg-row"><label>ごほうび(名前,レア度) ※1行に1つ</label>
            <textarea id="cfg-prizes" rows="4"></textarea>
        </div>
        <button class="btn-done" style="width:100%; height:8vh;" onclick="saveConfig()">保存して再開</button>
        <button onclick="document.getElementById('config-modal').style.display='none'" style="width:100%; margin-top:10px; padding:10px; background:none; border:none; color:#666;">とじる</button>
    </div>

    <script>
        let config = {
            name: "冒険者", theme: "theme-green", pauseName: "ちょっとまって！", gachaCost: 1000,
            tasks: [{t:"おきる", s:600},{t:"ごはん", s:900},{t:"はをみがく", s:300}],
            prizes: [
                {n:"おかし", r:"ノーマル"}, {n:"YouTube 10分", r:"レア"}, {n:"新しいおもちゃ", r:"Sレア"}
            ]
        };
        let state = { idx: 0, left: 0, total: 0, score: 0, tid: null, spinning: false, isPaused: false };

        window.onload = () => {
            const scfg = localStorage.getItem('child_todo_v11_cfg');
            if(scfg) config = JSON.parse(scfg);
            const ss = localStorage.getItem('child_todo_v11_score');
            state.score = ss ? parseInt(ss) : 0;
            const si = localStorage.getItem('child_todo_v11_idx');
            state.idx = si ? parseInt(si) : 0;

            applyTheme();
            document.getElementById('display-name').innerText = config.name;
            document.getElementById('display-score').innerText = state.score;
            document.getElementById('pause-btn').innerText = config.pauseName;
            
            updateClock(); setInterval(updateClock, 1000);
            startTask();
        };

        function applyTheme() { document.body.className = config.theme; }
        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP'); }

        function startTask() {
            const t = config.tasks[state.idx];
            if(!t) { showCongrats(true); return; }
            state.left = state.total = t.s;
            state.isPaused = false;
            updatePauseUI();
            document.getElementById('task-title').innerText = `${state.idx+1}) ${t.t}`;
            if(state.tid) clearInterval(state.tid);
            state.tid = setInterval(() => {
                if(!state.isPaused && state.left > 0) {
                    state.left--;
                    const m = Math.floor(state.left/60), s = state.left%60;
                    document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                    document.getElementById('task-img').style.height = (state.left / state.total * 100) + "%";
                }
            }, 1000);
        }

        function togglePause() { state.isPaused = !state.isPaused; updatePauseUI(); }

        function updatePauseUI() {
            const btn = document.getElementById('pause-btn');
            const overlay = document.getElementById('pause-overlay');
            if(state.isPaused) {
                btn.innerText = "再開する";
                btn.classList.add('active');
                overlay.style.display = 'flex';
            } else {
                btn.innerText = config.pauseName;
                btn.classList.remove('active');
                overlay.style.display = 'none';
            }
        }

        function completeTask() {
            state.score += state.left;
            state.idx++; 
            localStorage.setItem('child_todo_v11_score', state.score);
            document.getElementById('display-score').innerText = state.score;
            if(state.idx < config.tasks.length) {
                localStorage.setItem('child_todo_v11_idx', state.idx);
                startTask();
            } else {
                localStorage.setItem('child_todo_v11_idx', 0);
                showCongrats(true);
            }
        }

        function showCongrats(isFinishAll = false) {
            if(state.tid) clearInterval(state.tid);
            document.getElementById('congrats-layer').style.display = 'flex';
            document.getElementById('final-pts').innerText = `あわせて ${state.score} pt！！`;
            const canGacha = state.score >= config.gachaCost;
            document.getElementById('exchange-btn').style.display = canGacha ? 'block' : 'none';
            document.getElementById('gacha-status').innerText = canGacha ? "" : `あと ${config.gachaCost - state.score} ptでガチャ！`;
        }

        function resetProgress() {
            state.score = 0; state.idx = 0;
            localStorage.setItem('child_todo_v11_score', 0);
            localStorage.setItem('child_todo_v11_idx', 0);
            location.reload();
        }

        function startGacha() { document.getElementById('gacha-overlay').style.display = 'flex'; }
        function spinGacha() {
            if(state.spinning) return;
            state.spinning = true;
            document.getElementById('gacha-handle').style.transform = "rotate(360deg)";
            setTimeout(() => {
                document.getElementById('capsule-obj').style.display = 'block';
                document.getElementById('hint-msg').innerText = "カプセルをタップ！";
            }, 700);
        }

        function openReward() {
            state.score -= config.gachaCost;
            localStorage.setItem('child_todo_v11_score', state.score);
            document.getElementById('display-score').innerText = state.score;
            const r = Math.random() * 100;
            let targetRare = "ノーマル";
            if(r > 90) targetRare = "Sレア"; else if(r > 60) targetRare = "レア";
            const pool = config.prizes.filter(p => p.r === targetRare);
            const res = pool.length > 0 ? pool[Math.floor(Math.random()*pool.length)] : config.prizes[0];
            document.getElementById('ticket-screen').style.display = 'flex';
            document.getElementById('prize-name').innerText = res.n;
            document.getElementById('rare-label').innerText = res.r + "！！";
        }

        function closeTicket() {
            document.getElementById('ticket-screen').style.display = 'none';
            document.getElementById('gacha-overlay').style.display = 'none';
            state.spinning = false;
            document.getElementById('capsule-obj').style.display = 'none';
            document.getElementById('gacha-handle').style.transform = "rotate(0deg)";
            showCongrats(true);
        }

        function openConfig() {
            document.getElementById('cfg-theme').value = config.theme;
            document.getElementById('cfg-name').value = config.name;
            document.getElementById('cfg-pause-name').value = config.pauseName;
            document.getElementById('cfg-gacha-cost').value = config.gachaCost;
            document.getElementById('cfg-tasks').value = config.tasks.map(x=>`${x.t},${x.s}`).join('\n');
            document.getElementById('cfg-prizes').value = config.prizes.map(x=>`${x.n},${x.r}`).join('\n');
            document.getElementById('config-modal').style.display = 'block';
        }

        function saveConfig() {
            config.theme = document.getElementById('cfg-theme').value;
            config.name = document.getElementById('cfg-name').value;
            config.pauseName = document.getElementById('cfg-pause-name').value;
            config.gachaCost = parseInt(document.getElementById('cfg-gacha-cost').value);
            config.tasks = document.getElementById('cfg-tasks').value.split('\n').filter(l=>l).map(l=>{
                const p = l.split(','); return {t:p[0].trim(), s:parseInt(p[1])||60};
            });
            config.prizes = document.getElementById('cfg-prizes').value.split('\n').filter(l=>l).map(l=>{
                const p = l.split(','); return {n:p[0].trim(), r:(p[1]||"ノーマル").trim()};
            });
            localStorage.setItem('child_todo_v11_cfg', JSON.stringify(config));
            localStorage.setItem('child_todo_v11_idx', 0);
            location.reload();
        }
    </script>
</body>
</html>
