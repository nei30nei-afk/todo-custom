<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冒険ToDo & ガチャ（配布カスタム版）</title>
    <style>
        :root {
            --primary-bg: #E8F5E9; --primary-main: #81C784; --primary-dark: #2E7D32; --accent: #FF80AB;
        }
        /* テーマカラー定義 */
        body.theme-green { --primary-bg: #E8F5E9; --primary-main: #81C784; --primary-dark: #2E7D32; }
        body.theme-pink  { --primary-bg: #FCE4EC; --primary-main: #F06292; --primary-dark: #880E4F; }
        body.theme-blue  { --primary-bg: #E1F5FE; --primary-main: #4FC3F7; --primary-dark: #01579B; }
        body.theme-yellow{ --primary-bg: #FFFDE7; --primary-main: #FFF176; --primary-dark: #F57F17; }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; background: var(--primary-bg); transition: 0.3s; }
        
        /* レイアウト：時計(1) : タスク(3) */
        #clock-area { height: 25vh; background: white; border-bottom: 4px solid var(--primary-main); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #clock { font-size: 10vh; font-weight: bold; color: var(--primary-dark); font-family: monospace; line-height: 1; }
        #player-display { font-size: 3vh; font-weight: bold; color: var(--primary-dark); margin-top: 5px; }

        #task-area { height: 75vh; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; box-sizing: border-box; position: relative; }

        /* タスク表示 */
        #task-title { font-size: 4.5vh; font-weight: bold; color: var(--primary-dark); text-align: center; }
        #timer { font-size: 12vh; font-weight: bold; color: #D32F2F; background: white; padding: 0 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .btn-done { background: var(--primary-main); color: white; border: none; width: 80%; padding: 20px; font-size: 5vh; font-weight: bold; border-radius: 25px; box-shadow: 0 6px var(--primary-dark); cursor: pointer; }
        .btn-done:active { transform: translateY(4px); box-shadow: 0 2px var(--primary-dark); }

        /* 補助ボタン */
        #pause-btn { position: absolute; bottom: 20px; left: 20px; background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 15px; font-size: 2vh; font-weight: bold; box-shadow: 0 4px #C51162; }
        #pause-btn.paused { background: #9E9E9E; box-shadow: 0 4px #616161; }
        #config-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 4vh; cursor: pointer; opacity: 0.5; }

        /* クリア画面 */
        #congrats-layer { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .pika-text { font-size: 6vh; font-weight: bold; color: #E65100; animation: pika 0.8s infinite; margin: 20px; }

        /* 設定画面（モーダル） */
        #config-modal { position: fixed; inset: 0; background: white; z-index: 200; padding: 20px; overflow-y: auto; display: none; }
        .config-item { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        .save-btn { background: #4CAF50; color: white; border: none; padding: 15px; width: 100%; font-size: 20px; font-weight: bold; border-radius: 10px; margin-top: 20px; }

        /* ガチャ・チケット演出（既存コード流用） */
        #gacha-overlay, #ticket-screen { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
        #gacha-overlay { background: #FFF9C4; }
        #ticket-screen { background: rgba(0,0,0,0.9); color: white; }
        #ticket-card { width: 80%; background: white; color: #333; padding: 25px; border-radius: 20px; border: 8px dashed #FF9800; text-align: center; }

        @keyframes pika { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body class="theme-green">

    <div id="clock-area">
        <button id="config-btn" onclick="openConfig()">⚙</button>
        <div id="clock">00:00:00</div>
        <div id="player-display"><span id="display-name">冒険者</span> のスコア: <span id="display-score">0</span> pt</div>
    </div>

    <div id="task-area">
        <div id="task-title">タスクを読み込み中...</div>
        <div id="timer">00:00</div>
        <button class="btn-done" onclick="completeTask()">できた！</button>
        <button id="pause-btn" onclick="togglePause()">ストップ</button>
    </div>

    <div id="congrats-layer">
        <h2 id="finish-msg" style="font-size:4vh;">ぜんぶできた！！</h2>
        <div id="final-pts" class="pika-text">0 pt</div>
        <button id="gacha-btn" class="btn-done" style="background:#FF9800; display:none;" onclick="startGacha()">🎁 ガチャをまわす！</button>
        <button onclick="location.reload()" style="margin-top:20px; background:none; border:none; text-decoration:underline;">あしたもがんばる</button>
    </div>

    <div id="config-modal">
        <h2>⚙ 設定（パパ・ママ用）</h2>
        <div class="config-item">
            <label>なまえ</label>
            <input type="text" id="cfg-name" value="冒険者">
        </div>
        <div class="config-item">
            <label>テーマカラー</label>
            <select id="cfg-theme">
                <option value="theme-green">グリーン</option>
                <option value="theme-pink">ピンク</option>
                <option value="theme-blue">ブルー</option>
                <option value="theme-yellow">イエロー</option>
            </select>
        </div>
        <div class="config-item">
            <label>一時停止ボタンのなまえ</label>
            <input type="text" id="cfg-pause-name" value="かか">
        </div>
        <div class="config-item">
            <label>クリア時のメッセージ</label>
            <input type="text" id="cfg-finish-msg" value="ぜんぶできた！！すごーい！">
        </div>
        <div class="config-item">
            <label>ガチャに必要なポイント</label>
            <input type="number" id="cfg-gacha-cost" value="5000">
        </div>
        <div class="config-item">
            <label>タスクと時間（タスク名,秒数 で1行ずつ）</label>
            <textarea id="cfg-tasks" rows="8">おきる,600
おしっこ,300
ごはん,900
はをみがく,300</textarea>
        </div>
        <div class="config-item">
            <label>ごほうび（名前,レア度 で1行ずつ / レア度は：ノーマル, レア, Sレア）</label>
            <textarea id="cfg-prizes" rows="5">YouTube 10分,ノーマル
おかし選べる,ノーマル
すきなジュース,レア
100円ショップ,Sレア</textarea>
        </div>
        <button class="save-btn" onclick="saveConfig()">保存してスタート！</button>
        <button onclick="closeConfig()" style="width:100%; margin-top:10px; background:#ccc; border:none; padding:10px; border-radius:10px;">キャンセル</button>
    </div>

    <div id="gacha-overlay">
        <h1 style="color:#D84315;">ドキドキガチャ</h1>
        <div id="gacha-status" style="font-size:3vh; margin:20px;">レバーをまわしてね！</div>
        <button class="btn-done" id="lever" onclick="spinGacha()">ぐるぐる！</button>
    </div>

    <div id="ticket-screen">
        <div id="ticket-card">
            <p>☆☆ ごほうびチケット ☆☆</p>
            <h1 id="prize-name" style="font-size:5vh; margin:20px 0;"></h1>
            <p id="prize-rare"></p>
        </div>
        <button class="btn-done" style="margin-top:30px;" onclick="location.reload()">またあした！</button>
    </div>

    <script>
        // デフォルト設定
        let config = {
            name: "冒険者", theme: "theme-green", pauseName: "かか", finishMsg: "ぜんぶできた！！",
            gachaCost: 5000,
            tasks: [{t:"タスク1", s:600}],
            prizes: [{n:"お菓子", r:"ノーマル"}]
        };

        let state = { idx: 0, left: 0, total: 0, score: 0, tid: null, isPaused: false };

        // 起動時処理
        window.onload = () => {
            loadAll();
            updateClock();
            setInterval(updateClock, 1000);
            startTask();
        };

        function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ja-JP'); }

        function loadAll() {
            const saved = localStorage.getItem('adv_custom_cfg');
            if(saved) config = JSON.parse(saved);
            const savedScore = localStorage.getItem('adv_custom_score');
            state.score = savedScore ? parseInt(savedScore) : 0;
            applyTheme();
        }

        function applyTheme() {
            document.body.className = config.theme;
            document.getElementById('display-name').innerText = config.name;
            document.getElementById('display-score').innerText = state.score;
            document.getElementById('pause-btn').innerText = config.pauseName;
            document.getElementById('finish-msg').innerText = config.finishMsg;
        }

        function startTask() {
            if(state.tid) clearInterval(state.tid);
            const t = config.tasks[state.idx];
            if(!t) { showCongrats(); return; }
            
            state.left = state.total = t.s;
            state.isPaused = false;
            document.getElementById('task-title').innerText = `${state.idx + 1}）${t.t}`;
            updatePauseBtn();

            state.tid = setInterval(() => {
                if(!state.isPaused && state.left > 0) {
                    state.left--;
                    const m = Math.floor(state.left/60), s = state.left%60;
                    document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }

        function completeTask() {
            state.score += state.left;
            localStorage.setItem('adv_custom_score', state.score);
            document.getElementById('display-score').innerText = state.score;
            state.idx++;
            startTask();
        }

        function togglePause() {
            state.isPaused = !state.isPaused;
            updatePauseBtn();
        }

        function updatePauseBtn() {
            const btn = document.getElementById('pause-btn');
            btn.innerText = state.isPaused ? "さいかい" : config.pauseName;
            btn.className = state.isPaused ? "paused" : "";
        }

        function showCongrats() {
            document.getElementById('congrats-layer').style.display = 'flex';
            document.getElementById('final-pts').innerText = `合計 ${state.score} pt！！`;
            if(state.score >= config.gachaCost) document.getElementById('gacha-btn').style.display = 'block';
        }

        // 設定モーダル操作
        function openConfig() {
            document.getElementById('cfg-name').value = config.name;
            document.getElementById('cfg-theme').value = config.theme;
            document.getElementById('cfg-pause-name').value = config.pauseName;
            document.getElementById('cfg-finish-msg').value = config.finishMsg;
            document.getElementById('cfg-gacha-cost').value = config.gachaCost;
            document.getElementById('cfg-tasks').value = config.tasks.map(x => `${x.t},${x.s}`).join('\n');
            document.getElementById('cfg-prizes').value = config.prizes.map(x => `${x.n},${x.r}`).join('\n');
            document.getElementById('config-modal').style.display = 'block';
        }

        function closeConfig() { document.getElementById('config-modal').style.display = 'none'; }

        function saveConfig() {
            config.name = document.getElementById('cfg-name').value;
            config.theme = document.getElementById('cfg-theme').value;
            config.pauseName = document.getElementById('cfg-pause-name').value;
            config.finishMsg = document.getElementById('cfg-finish-msg').value;
            config.gachaCost = parseInt(document.getElementById('cfg-gacha-cost').value);
            
            config.tasks = document.getElementById('cfg-tasks').value.split('\n').filter(l=>l).map(l => {
                const [t, s] = l.split(','); return {t: t.trim(), s: parseInt(s)||60};
            });
            config.prizes = document.getElementById('cfg-prizes').value.split('\n').filter(l=>l).map(l => {
                const [n, r] = l.split(','); return {n: n.trim(), r: (r||"ノーマル").trim()};
            });

            localStorage.setItem('adv_custom_cfg', JSON.stringify(config));
            closeConfig();
            location.reload();
        }

        // ガチャロジック
        function startGacha() { document.getElementById('gacha-overlay').style.display = 'flex'; }
        function spinGacha() {
            const btn = document.getElementById('lever');
            btn.disabled = true;
            document.getElementById('gacha-status').innerText = "まわってるよ...";
            setTimeout(() => {
                state.score -= config.gachaCost;
                localStorage.setItem('adv_custom_score', state.score);
                const rand = Math.random()*100;
                let pool = rand<10 ? config.prizes.filter(x=>x.r==="Sレア") : rand<40 ? config.prizes.filter(x=>x.r==="レア") : config.prizes.filter(x=>x.r==="ノーマル");
                if(pool.length === 0) pool = config.prizes;
                const res = pool[Math.floor(Math.random()*pool.length)];
                
                document.getElementById('prize-name').innerText = res.n;
                document.getElementById('prize-rare').innerText = `レア度：${res.r}`;
                document.getElementById('ticket-screen').style.display = 'flex';
            }, 1500);
        }
    </script>
</body>
</html>
